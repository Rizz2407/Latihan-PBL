 <!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width,initial-scale=1"/>

        <title>Latihan CSS</title>
        <style>            
            header{
                background-color: blue;
                color: white;
                height: 240px;
                font-family: Arial;
                font-size: 60px;
                align-items: center;
                justify-content: center;
                text-align: center;

            }
            main{
                display:flex;
                min-height: 360px;
            }

            .menu-left{
                background-color: red;
                color: white;
                display: flex;
                height: 350px;
                width: 50%;
                padding: 6px;
                text-align: center;
                align-items: center;
                justify-content: center;
            }

            .content{
                background-color: green;
                color: white;
                display: flex;
                height: 350px;
                width: 49%;
                padding: 6px;
                float: right;
            }

        </style>
    </head>
    <body>
        <header class="header">Header</header>
        <div class="main">
            <aside class="menu-left">Menu Kiri</aside>
            <aside class="content">Konten</aside>
        </div>
         
    </body>
 </html>
